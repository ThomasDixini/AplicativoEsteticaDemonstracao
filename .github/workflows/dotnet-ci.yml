# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET CI

on:
  push:
    branches: [ "main", "develop" ]

jobs:
  build:
    name: Build (.NET 9)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restaurar dependencias
        run: dotnet restore
        
      - name: Build
        run: dotnet build --no-restore
        
      - name: Lint (Format check)
        run: dotnet format --verify-no-changes --no-restore
  tests:
    name: Test (.NET 9)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4
        
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          
      - name: Restaurar dependencias
        run: dotnet restore
        
      - name: Test com cobertura
        run: |
          dotnet test --no-restore --verbosity normal \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=opencover \
            /p:CoverletOutput=${{ github.workspace }}/backend/coverage.opencover.xml
      
      - name: Debug - listar XMLs gerados
        run: find . -name "*.opencover.xml" || find $HOME -name "*.opencover.xml" || echo "Nenhum XML encontrado"

      - name: Debug - listar tudo no working dir
        working-directory: backend
        run: |
          echo "=== Estrutura do backend ==="
          find . -name "*.xml" | head -50
          echo "=== Arquivos de cobertura ==="
          find . -name "*coverage*"
          echo "=== Pastas de teste ==="
          ls -la Tests/ || echo "Pasta Tests nao encontrada"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: backend/coverage.opencover.xml
          if-no-files-found: error
  analyze:
    name: Analyze (Sonar Cube)
    runs-on: windows-latest
    needs: [ build, tests ]

    defaults:
      run:
        working-directory: backend
    
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restaurar dependencias
        run: dotnet restore

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: backend

      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~\sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: powershell
        run: |
          New-Item -Path ${{ runner.temp }}\scanner -ItemType Directory
          dotnet tool update dotnet-sonarscanner --tool-path ${{ runner.temp }}\scanner
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: powershell
        run: |
          ${{ runner.temp }}\scanner\dotnet-sonarscanner begin /k:"ThomasDixini_AplicativoEsteticaDemonstracao" /o:"thomasdixini" /d:sonar.token="${{ secrets.SONAR_TOKEN }}" /d:sonar.cs.opencover.reportsPaths="${{ github.workspace }}\backend\coverage.opencover.xml"
          dotnet build
          ${{ runner.temp }}\scanner\dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
